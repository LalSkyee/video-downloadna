<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Video Downloader</title>
<link rel="icon" href="favicon.ico">

<style>

body{
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background:#0f172a; /* deep dark blue */
  color:#e5e7eb;
}

.container{
  max-width:900px;
  margin:60px auto;
  background:#1e293b; /* dark card */
  border-radius:16px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
  padding:40px;
}

h1{
  margin:0;
  font-size:28px;
  color:#f8fafc;
}

input{
  width:100%;
  padding:14px;
  margin-top:20px;
  border-radius:10px;
  border:1px solid #334155;
  background:#0f172a;
  color:white;
  font-size:15px;
}

input::placeholder{
  color:#64748b;
}

.primary-btn{
  margin-top:15px;
  padding:14px;
  width:100%;
  background:#3b82f6;
  border:none;
  color:white;
  font-weight:600;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.primary-btn:hover{
  background:#2563eb;
}

.video-info{
  display:flex;
  gap:20px;
  margin-top:30px;
}

.video-info img{
  width:220px;
  height:130px;
  object-fit:cover;
  border-radius:12px;
  background:#0f172a;
  border:1px solid #334155;
}

.meta{
  flex:1;
}

.meta h2{
  margin:0 0 10px 0;
  color:#f1f5f9;
}

.meta p{
  color:#94a3b8;
}

.formats{
  margin-top:30px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
}

.format-card{
  background:#0f172a;
  border:1px solid #334155;
  border-radius:12px;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.2s;
}

.format-card:hover{
  border-color:#3b82f6;
  box-shadow:0 5px 20px rgba(0,0,0,0.4);
}

.download-icon{
  background:#3b82f6;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  transition:0.2s;
}

.download-icon:hover{
  background:#2563eb;
}

.progress{
  margin-top:20px;
  height:6px;
  background:#334155;
  border-radius:10px;
  overflow:hidden;
}

#bar{
  height:100%;
  width:0%;
  background:#3b82f6;
  transition:width .3s;
}

/* ---------- INPUT IMPROVEMENTS ---------- */

.input-wrapper{
  position:relative;
  margin-top:20px;
}

.input-wrapper input{
  padding-right:40px;
  transition:0.2s;
}

.input-wrapper input:focus{
  outline:none;
  border-color:#3b82f6;
  box-shadow:0 0 0 3px rgba(59,130,246,0.2);
}

.clear-btn{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:#64748b;
  font-weight:bold;
  font-size:16px;
  opacity:0;
  transition:0.2s;
}

.clear-btn:hover{
  color:#f87171;
}

/* ---------- BUTTON ANIMATION ---------- */

.secondary-btn{
  margin-top:20px;
  padding:12px;
  width:100%;
  background:#334155;
  border:none;
  color:#e2e8f0;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.secondary-btn:hover{
  background:#475569;
}

.fade-btn{
  opacity:0;
  transform:translateY(10px);
  transition:0.3s ease;
}

.fade-btn.show{
  opacity:1;
  transform:translateY(0);
}

/* ---------- SMOOTH RESET ---------- */

.container.fade-out{
  opacity:0.5;
  transform:scale(0.98);
  transition:0.2s ease;
}

.loader{
  margin-top:20px;
  color:#94a3b8;
  display:none;
}
.input-wrapper{
  position:relative;
  margin-top:20px;
}

.input-wrapper input{
  padding-right:40px;
}

.clear-btn{
  position:absolute;
  right:15px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  color:#64748b;
  font-weight:bold;
  font-size:16px;
}

.clear-btn:hover{
  color:#f87171;
}

.secondary-btn{
  margin-top:20px;
  padding:12px;
  width:100%;
  background:#334155;
  border:none;
  color:#e2e8f0;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.secondary-btn:hover{
  background:#475569;
}

.mode-switch{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.mode-switch button{
  flex:1;
  padding:10px;
  background:#334155;
  border:none;
  color:#e2e8f0;
  border-radius:8px;
  cursor:pointer;
}

.mode-switch button.active{
  background:#3b82f6;
}
.fade-btn{
  opacity:0;
  transform:translateY(10px);
  transition:0.3s ease;
}

.fade-btn.show{
  opacity:1;
  transform:translateY(0);
}

</style>
</head>
<body>

<div class="container">

  <div class="mode-switch">
  <button onclick="setMode('reels')" id="reelsBtn">IG Reels</button>
  <button onclick="setMode('youtube')" id="ytBtn">YouTube MP4</button>
  <button onclick="setMode('mp3')" id="mp3Btn">YouTube MP3</button>
  </div>

<h1 id="mainTitle">YouTube Vid Download na</h1>

<div class="input-wrapper">
  <input id="url" placeholder="Video link paste rawh" oninput="toggleClear()">
  <span id="clearBtn" class="clear-btn" onclick="clearInput()">✕</span>
</div>

<button class="primary-btn" onclick="fetchFormats()">
  A fiah zawng thlan na
</button>

<div class="loader" id="loader">Zawng meks...</div>

<div class="video-info" id="videoSection" style="display:none;">
  <img id="thumb" style="display:none;">
  <div class="meta">
    <h2 id="videoTitle"></h2>
    <p id="videoMeta"></p>
  </div>
</div>

<div class="formats" id="formats"></div>

<div class="progress">
  <div id="bar"></div>
</div>

<button id="moreBtn" class="secondary-btn fade-btn"
        onclick="downloadMore()">
  ⬅ A dang Download leh na
</button>

</div>

<script>

function trackProgress(){
  const interval = setInterval(async () => {

    const res = await fetch("http://localhost:3000/progress");
    const data = await res.json();

    document.getElementById("bar").style.width =
      data.progress + "%";

    if(data.progress >= 100){
      clearInterval(interval);
    }

  }, 800);
}

async function fetchFormats(){

  const url = document.getElementById("url").value;
  const loader = document.getElementById("loader");
  const formatsDiv = document.getElementById("formats");

  loader.style.display="block";
  formatsDiv.innerHTML="";

  const res = await fetch(
    "http://localhost:3000/formats?url=" + encodeURIComponent(url)
  );

  const data = await res.json();
  loader.style.display="none";

  if(!data.formats) return;

  document.getElementById("videoSection").style.display="flex";
  document.getElementById("videoTitle").innerText = data.title;
  document.getElementById("videoMeta").innerText =
    data.duration + " • " + data.platform;

  const img = document.getElementById("thumb");

  if(data.thumbnail){
    img.src = data.thumbnail;
    img.style.display = "block";
  }else{
    img.style.display = "none";
  }

  data.formats.forEach(f => {

    const card = document.createElement("div");
    card.className="format-card";

    card.innerHTML = `
      <div>
        <strong>${f.resolution}</strong><br>
        <small>${f.size}</small>
      </div>
      <button class="download-icon"
        onclick="download('${f.format_id}')">
        ⬇
      </button>
    `;

    formatsDiv.appendChild(card);

  });

  document.getElementById("moreBtn").classList.add("show");

}

function download(format){

  const url = document.getElementById("url").value;
  const title =
    document.getElementById("videoTitle").innerText || "video";

  if(currentMode === "mp3"){
    window.open(
      "http://localhost:3000/download-mp3?url="
      + encodeURIComponent(url)
      + "&title=" + encodeURIComponent(title)
    );
  } else {
    window.open(
      "http://localhost:3000/download?url="
      + encodeURIComponent(url)
      + "&format=" + format
      + "&title=" + encodeURIComponent(title)
    );
  }
}

function toggleClear(){
  const input = document.getElementById("url");
  const clearBtn = document.getElementById("clearBtn");

  if(input.value.length > 0){
    clearBtn.style.opacity = "1";
  }else{
    clearBtn.style.opacity = "0";
  }
}

function clearInput(){
  document.getElementById("url").value = "";
  document.getElementById("formats").innerHTML = "";
  document.getElementById("videoSection").style.display = "none";
  document.getElementById("bar").style.width = "0%";
  document.getElementById("clearBtn").style.opacity = "0";
}

function downloadMore(){

  const container = document.querySelector(".container");
  container.classList.add("fade-out");

  setTimeout(() => {
    clearInput();
    container.classList.remove("fade-out");
    document.getElementById("moreBtn").classList.remove("show");
  }, 200);

}

let currentMode = "reels";

function setMode(mode){
  currentMode = mode;

  const title = document.getElementById("mainTitle");

  document.querySelectorAll(".mode-switch button")
    .forEach(btn => btn.classList.remove("active"));

  if(mode === "reels"){
    document.getElementById("reelsBtn").classList.add("active");
    title.innerText = "Reels Download na";
  }

  if(mode === "youtube"){
    document.getElementById("ytBtn").classList.add("active");
    title.innerText = "Youtube vid download na";
  }

  if(mode === "mp3"){
    document.getElementById("mp3Btn").classList.add("active");
    title.innerText = "Youtube Audio Download na";
  }

  clearInput();

}setMode("reels");

</script>

</body>
</html>
